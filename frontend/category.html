<!DOCTYPE html>
<html lang="en">
<head>
  <title>Category Resources | Quantum Mentor World</title>
  <meta name="description" content="Browse legal educational resources in specific categories on Quantum Mentor World." />
  <meta name="robots" content="index, follow" />
  <!-- Replace https://quantummentorworld.com with the real production domain before launch. -->
  <link rel="canonical" href="https://quantummentorworld.com/category.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Category Resources | Quantum Mentor World" />
  <meta property="og:description" content="Browse legal educational resources in specific categories on Quantum Mentor World." />
  <meta property="og:url" content="https://quantummentorworld.com/category.html" />
  <meta property="og:site_name" content="Quantum Mentor World" />
  <meta property="og:image" content="https://quantummentorworld.com/assets/images/logo.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Category Resources | Quantum Mentor World" />
  <meta name="twitter:description" content="Browse legal educational resources in specific categories on Quantum Mentor World." />
  <meta name="twitter:image" content="https://quantummentorworld.com/assets/images/logo.png" />

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body>

  <!-- Site Header -->
  <header id="site-header" role="banner">
    <div class="container" style="display:flex;align-items:center;justify-content:space-between;width:100%;">
      <a href="index.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;">
        <img src="assets/images/logo.png" alt="Quantum Mentor Official Logo" height="40" onerror="this.style.display='none'" />
        <span style="font-family:var(--font-primary);font-weight:700;font-size:var(--text-xl);color:var(--primary);">Quantum Mentor World</span>
      </a>
      <nav aria-label="Main navigation" style="display: flex; gap: 16px;">
        <a href="software.html" style="font-size: var(--text-sm); font-weight: 500; color: var(--text-main);">Software</a>
        <a href="books.html" style="font-size: var(--text-sm); font-weight: 500; color: var(--text-main);">Books</a>
        <a href="tools.html" style="font-size: var(--text-sm); font-weight: 500; color: var(--text-main);">Tools</a>
        <a href="games.html" style="font-size: var(--text-sm); font-weight: 500; color: var(--text-main);">Games</a>
        <a href="themes-plugins.html" style="font-size: var(--text-sm); font-weight: 500; color: var(--text-main);">Themes</a>
        <a href="watch.html" style="font-size: var(--text-sm); font-weight: 500; color: var(--text-main);">Watch</a>
        <a href="news.html" style="font-size: var(--text-sm); font-weight: 500; color: var(--text-main);">News</a>
        <a href="github-repos.html" style="font-size: var(--text-sm); font-weight: 500; color: var(--text-main);">GitHub</a>
      </nav>
    </div>
  </header>

  <main id="main-content">
    <div class="container" style="padding: var(--space-8) var(--space-6);">
      
      <!-- Category Title Block -->
      <section class="detail-hero" style="margin-bottom: var(--space-8);">
        <span class="badge" style="margin-bottom: 12px;">📁 Category Index</span>
        <h1 id="category-title" style="font-size: var(--text-4xl); margin-bottom: 8px; color: var(--text-main);">Loading Category...</h1>
        <p id="category-description" style="font-size: var(--text-base); color: var(--text-muted); max-width: 800px; line-height: 1.6;"></p>
      </section>

      <!-- Filter Controls Panel -->
      <section class="filter-panel" style="margin-bottom: var(--space-6);">
        <div class="filter-grid" style="display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-4); align-items: center; margin-bottom: 16px;">
          
          <!-- Search input inside category -->
          <div style="position: relative;">
            <input 
              id="category-search-input" 
              class="form-input" 
              type="search" 
              placeholder="Search in this category..." 
              style="padding-right: 40px;"
            />
          </div>

          <!-- Sorting selection dropdown -->
          <div>
            <select id="category-sort-select" class="form-select">
              <option value="latest">Latest Published</option>
              <option value="oldest">Oldest Published</option>
              <option value="title_asc">Title A-Z</option>
              <option value="title_desc">Title Z-A</option>
              <option value="popular">Popularity (Views)</option>
            </select>
          </div>

        </div>

        <!-- Filter Actions (chips and reset) -->
        <div class="filter-actions" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
          <div id="category-active-filters" class="active-filters" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
          <button id="category-clear-filters" class="btn btn-ghost btn-sm" style="display: none;">Clear Filters</button>
        </div>
      </section>

      <!-- Result Counter text -->
      <p id="category-status-text" class="result-status" style="margin-bottom: 16px; font-size: var(--text-sm); color: var(--text-muted); font-weight: 500;"></p>

      <!-- State Handlers -->
      <div id="category-loading" class="state-message" style="text-align: center; padding: 40px 0;">
        <div class="skeleton" style="width: 100%; height: 250px; border-radius: var(--radius-lg); margin-bottom: 16px;"></div>
        <p style="color: var(--text-muted);">Loading resources...</p>
      </div>

      <div id="category-error" style="display: none; padding: 20px 0;"></div>

      <div id="category-empty" style="display: none; padding: 20px 0;"></div>

      <!-- Resource Card Grid -->
      <div id="category-grid" class="resource-grid" style="display: none;">
        <!-- Dynamic resource cards render here -->
      </div>

      <!-- Pagination Container -->
      <div id="category-pagination" class="pagination" style="margin-top: var(--space-8); display: flex; justify-content: center; gap: 8px;">
        <!-- Pagination controls render dynamically -->
      </div>

    </div>
  </main>

  <!-- Site Footer -->
  <footer id="site-footer" role="contentinfo">
    <p>&copy; 2024 Quantum Mentor World — Quantum Mentor Official. All rights reserved.</p>
    <p style="margin-top:8px;font-size:var(--text-xs); color: var(--text-subtle);">All resources are verified legal and safe.</p>
  </footer>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/filters.js"></script>
  <script src="assets/js/pagination.js"></script>
  <script src="assets/js/seo.js"></script>
  <script src="assets/js/categories.js"></script>
</body>
</html>
